/*
 *  TCP/IP統合（lwIP，BSDソケット互換）の静的オブジェクト
 *  （net_cfg.hと一致させること）
 */
#include "net/net_cfg.h"

/*
 *  sys_arch セマフォプール（netconn毎のop_completed用．counting）
 */
CRE_SEM(NET_SEM1, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM2, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM3, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM4, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM5, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM6, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM7, { TA_NULL, 0, 1 });
CRE_SEM(NET_SEM8, { TA_NULL, 0, 1 });

/*
 *  sys_arch メールボックスプール（ASP3 CRE_DTQをそのまま使用．
 *  メッセージは常に1ポインタ分＝ボックス化不要）
 */
CRE_DTQ(NET_MBOX1,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX2,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX3,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX4,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX5,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX6,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX7,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX8,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX9,  { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });
CRE_DTQ(NET_MBOX10, { TA_NULL, SYS_ARCH_MBOX_DEPTH, NULL });

/*
 *  NET_TSK：lwIPの唯一のスレッド（tcpip_thread）の実体．休止状態で
 *  生成し，sys_thread_new()（tcpip_init()から一度だけ呼ばれる）が
 *  act_tskで起動する．
 */
CRE_TSK(NET_TSK, { TA_NULL, 0, net_task_entry, NET_TASK_PRI, NET_TASK_STKSZ, NULL });
