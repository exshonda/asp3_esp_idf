/*
 *		シリアルインタフェースドライバのチップ依存部（ESP32-C5用）のコン
 *		フィギュレーションファイル（非TECS版専用）
 *
 *  arch/arm_m_gcc/rp2350/chip_serial.cfg からの流用．
 *  （esp32c6版（asp3_core/arch/riscv_gcc/esp32c6/）からのコピー・C5対応．
 *  本ファイルはチップ非依存の内容のため識別子置換のみで移植．）
 */

/* sio_initializeはsoftware_init_hookから呼び出すため，ATT_INIは不要 */
/* ATT_INI({ TA_NULL, 0, sio_initialize }); */
ATT_TER({ TA_NULL, 0, sio_terminate });
CFG_INT(INTNO_SIO, { INTATR_SIO, INTPRI_SIO });
CRE_ISR(ISR_SIO, { TA_NULL, 1, INTNO_SIO, sio_isr, ISRPRI_SIO });
