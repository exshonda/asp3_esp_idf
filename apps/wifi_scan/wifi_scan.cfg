INCLUDE("syssvc/syslog.cfg");
INCLUDE("syssvc/banner.cfg");
INCLUDE("syssvc/serial.cfg");
INCLUDE("syssvc/logtask.cfg");

#include "wifi_scan.h"
CRE_TSK(MAIN_TASK, { TA_ACT, 0, main_task, MAIN_PRIORITY, STACK_SIZE, NULL });

/*
 *  【実施24】PD_TOP系A/B用のJTAG非依存UART計装（wifi_scan.c参照）。
 *  1秒周期でトーン測定チェーンの生ADC/IQ_DONEとPD_*レジスタをsyslogへ
 *  出す。TNFY_HANDLER＝タスク非依存コンテキストなので，main_taskが
 *  PHY較正の無限リトライループで停止していても発火し続ける。
 */
#ifdef TOPPERS_ESP32C5_WIFI_REGI2C_TRACE
CRE_CYC(WIFI_DIAG_CYC, { TA_STA, { TNFY_HANDLER, 0, wifi_diag_cyclic_handler }, 1000000, 0 });
#endif

/*
 *  【実施38】候補0（TX/RX 2×2判定）用のUART計装。1秒周期でpromiscuous
 *  RXカウント・Wi-Fi MAC割込みレート・トーンADC/IQ_DONE(AGC生存代理)を
 *  出す（wifi_scan.c参照）。
 */
#ifdef ESP32C5_R38_RXINSTR
CRE_CYC(R38_RXINSTR_CYC, { TA_STA, { TNFY_HANDLER, 0, r38_rxinstr_cyclic_handler }, 1000000, 0 });
#endif
