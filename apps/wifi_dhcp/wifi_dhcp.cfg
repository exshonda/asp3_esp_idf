/*
 *  実施45診断計装：アクセス系CPU例外一式をfault_capture_handlerへ
 *  登録（docs/c5-bringup.md 実施45）。EXCNO_*はcore_kernel.h（全
 *  riscv_gccターゲット共通）で定義される数値定数．
 */
DEF_EXC(EXCNO_FAULT_FETCH, { TA_NULL, fault_capture_handler });
DEF_EXC(EXCNO_IINST, { TA_NULL, fault_capture_handler });
DEF_EXC(EXCNO_MISALIGNED_LOAD, { TA_NULL, fault_capture_handler });
DEF_EXC(EXCNO_FAULT_LOAD, { TA_NULL, fault_capture_handler });
DEF_EXC(EXCNO_MISALIGNED_STORE, { TA_NULL, fault_capture_handler });
DEF_EXC(EXCNO_FAULT_STORE, { TA_NULL, fault_capture_handler });
